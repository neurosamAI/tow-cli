<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} - Tow</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9875;</text></svg>">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }} - Tow">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
</head>
<body>
  <!-- Mobile nav toggle -->
  <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>

  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-icon">&#9875;</span> Tow
      </a>
      <p class="tagline">Deploy without the complexity</p>
    </div>
    <ul class="nav-links">
      {% for item in site.nav %}
      <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a></li>
      {% endfor %}
    </ul>
    <div class="sidebar-footer">
      <a href="https://github.com/neurosamAI/tow-cli" class="github-link">GitHub</a>
      <p class="version">v0.1.0</p>
      <p style="color: var(--text-tertiary); font-size: 0.65rem; margin-top: 0.5rem; line-height: 1.4;">
        by <a href="https://github.com/comchangs" style="color: var(--text-tertiary);">comchangs</a>
      </p>
    </div>
  </nav>

  <main class="content">
    <article>
      {{ content }}
    </article>
  </main>

  <script>
    // Mobile nav toggle
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.querySelector('.nav-toggle');
      const sidebar = document.querySelector('.sidebar');
      const content = document.querySelector('.content');

      if (toggle) {
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          sidebar.classList.toggle('open');
        });
      }

      content.addEventListener('click', function() {
        sidebar.classList.remove('open');
      });
    });
  </script>
</body>
</html>

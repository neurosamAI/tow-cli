<aside id="sidebar" class="fixed top-0 left-0 z-40 w-[272px] h-screen bg-brand-950 border-r border-white/[0.06] overflow-y-auto transition-transform -translate-x-full lg:translate-x-0">
  <div class="flex flex-col h-full">
    <!-- Header -->
    <div class="px-5 pt-5 pb-4 border-b border-white/[0.06]">
      <a href="/" class="flex items-center gap-2.5">
        <span class="text-xl">&#9875;</span>
        <span class="text-lg font-bold text-gradient">Tow</span>
      </a>
      <p class="text-xs text-gray-600 mt-1.5">Deploy without the complexity</p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5">
      {{ range .Site.Params.nav.items }}
      <a href="{{ .url }}"
         class="sidebar-link block px-3 py-2 text-sm rounded-lg transition-colors
                {{ if eq $.RelPermalink .url }}active font-medium{{ else }}text-gray-400 hover:text-gray-200 hover:bg-white/[0.04]{{ end }}">
        {{ .title }}
      </a>
      {{ end }}
    </nav>

    <!-- Footer -->
    <div class="px-5 py-4 border-t border-white/[0.06]">
      <a href="{{ .Site.Params.github }}" target="_blank" class="flex items-center gap-2 text-xs text-gray-500 hover:text-gray-300 transition-colors mb-2">
        <i class="fa-brands fa-github"></i> GitHub
      </a>
      <p class="text-[11px] text-gray-700"><span id="tow-version">{{ .Site.Params.version }}</span></p>
      <p class="text-[11px] text-gray-700 mt-0.5">
        by <a href="https://github.com/comchangs" class="hover:text-gray-500 transition-colors">comchangs</a>
        · <a href="{{ .Site.Params.mainSiteURL }}" class="hover:text-gray-500 transition-colors">neurosam.AI</a>
      </p>
    </div>
  </div>
</aside>

<!-- Top bar (mobile + desktop) -->
<header class="sticky top-0 z-30 bg-brand-950/80 backdrop-blur-xl border-b border-white/[0.06]">
  <div class="flex items-center justify-between h-14 px-5">
    <div class="flex items-center gap-3">
      <!-- Mobile sidebar toggle -->
      <button id="sidebar-toggle" class="lg:hidden p-1.5 -ml-1.5 text-gray-400 hover:text-white">
        <i class="fas fa-bars"></i>
      </button>
      <span class="text-sm text-gray-500 hidden sm:inline">{{ with .Title }}{{ . }}{{ end }}</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="{{ .Site.Params.ossURL }}" class="text-xs text-gray-500 hover:text-gray-300 transition-colors hidden sm:inline">Open Source</a>
      <a href="{{ .Site.Params.mainSiteURL }}" class="text-xs text-gray-500 hover:text-gray-300 transition-colors hidden sm:inline">neurosam.AI</a>
      <a href="{{ .Site.Params.github }}" target="_blank" class="text-gray-500 hover:text-gray-300 transition-colors">
        <i class="fa-brands fa-github text-sm"></i>
      </a>
    </div>
  </div>
</header>

{{ define "main" }}
<div class="max-w-4xl mx-auto px-5 sm:px-8 py-10">
  <article class="prose max-w-none">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <div class="mb-3">
      <a href="{{ .RelPermalink }}" class="text-brand-400 hover:text-brand-200">{{ .Title }}</a>
    </div>
    {{ end }}
  </article>
</div>
{{ end }}

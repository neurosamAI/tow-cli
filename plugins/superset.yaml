# Apache Superset module handler
# by neurosam.AI — https://neurosam.ai

name: superset
description: Apache Superset modern data exploration and visualization platform
version: "1.0.0"
author: neurosam.AI

package:
  default_version: "4.1.1"
  url_template: "https://github.com/apache/superset/archive/refs/tags/{{VERSION}}.tar.gz"
  versions:
    "4.1.1": "https://github.com/apache/superset/archive/refs/tags/4.1.1.tar.gz"
    "4.0.2": "https://github.com/apache/superset/archive/refs/tags/4.0.2.tar.gz"
    "3.1.3": "https://github.com/apache/superset/archive/refs/tags/3.1.3.tar.gz"

build_cmd: "pip install apache-superset=={{VERSION}} --prefix={{BASE_DIR}}/current"
start_cmd: "SUPERSET_HOME={{BASE_DIR}}/data {{BASE_DIR}}/current/bin/superset run -h 0.0.0.0 -p {{PORT}} >> {{BASE_DIR}}/logs/superset.log 2>&1 &"
stop_cmd: "kill $(lsof -i :{{PORT}} -t 2>/dev/null) 2>/dev/null || true"
status_cmd: "lsof -i :{{PORT}} -t 2>/dev/null"

artifact_path: "external-package/superset.tar.gz"
package_includes:
  - bin/
  - lib/

health_check:
  type: http
  target: "http://localhost:{{PORT}}/health"
  timeout: 120

provision:
  packages:
    - python3
    - python3-pip
    - python3-venv
    - libpq-dev
    - libssl-dev
    - libffi-dev
  directories:
    - "{{BASE_DIR}}/data"
  commands:
    - "export SUPERSET_HOME={{BASE_DIR}}/data"

data_dirs:
  - data

log_file: "superset.log"

# CMAK (Cluster Manager for Apache Kafka) module handler
# by neurosam.AI — https://neurosam.ai

name: cmak
description: Cluster Manager for Apache Kafka (formerly Kafka Manager)
version: "1.0.0"
author: neurosam.AI

package:
  default_version: "3.0.0.6"
  url_template: "https://github.com/yahoo/CMAK/releases/download/{{VERSION}}/cmak-{{VERSION}}.zip"
  versions:
    "3.0.0.6": "https://github.com/yahoo/CMAK/releases/download/3.0.0.6/cmak-3.0.0.6.zip"
    "3.0.0.5": "https://github.com/yahoo/CMAK/releases/download/3.0.0.5/cmak-3.0.0.5.zip"

build_cmd: ""
start_cmd: "nohup {{BASE_DIR}}/current/bin/cmak -Dconfig.file={{BASE_DIR}}/conf/application.conf -Dhttp.port={{PORT}} > {{BASE_DIR}}/logs/cmak.log 2>&1 &"
stop_cmd: "kill $(pgrep -f 'cmak.*{{BASE_DIR}}') 2>/dev/null || true"
status_cmd: "curl -sf http://localhost:{{PORT}}/ | head -1"

artifact_path: "external-package/cmak.zip"
package_includes:
  - bin/
  - lib/
  - conf/

health_check:
  type: http
  target: "http://localhost:{{PORT}}/"
  timeout: 60

provision:
  packages:
    - openjdk-11-jre-headless
  directories:
    - "{{BASE_DIR}}/data"

data_dirs: []

log_file: "cmak.log"

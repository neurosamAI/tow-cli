# MariaDB module handler
# by neurosam.AI — https://neurosam.ai

name: mariadb
description: MariaDB open-source relational database forked from MySQL
version: "1.0.0"
author: neurosam.AI

package:
  default_version: "11.4.4"
  url_template: "https://downloads.mariadb.com/MariaDB/mariadb-{{VERSION}}/bintar-linux-x86_64/mariadb-{{VERSION}}-linux-x86_64.tar.gz"
  versions:
    "11.4.4": "https://downloads.mariadb.com/MariaDB/mariadb-11.4.4/bintar-linux-x86_64/mariadb-11.4.4-linux-x86_64.tar.gz"
    "10.11.10": "https://downloads.mariadb.com/MariaDB/mariadb-10.11.10/bintar-linux-x86_64/mariadb-10.11.10-linux-x86_64.tar.gz"
    "10.6.20": "https://downloads.mariadb.com/MariaDB/mariadb-10.6.20/bintar-linux-x86_64/mariadb-10.6.20-linux-x86_64.tar.gz"

build_cmd: ""
start_cmd: "{{BASE_DIR}}/current/bin/mysqld_safe --defaults-file={{BASE_DIR}}/conf/my.cnf --datadir={{BASE_DIR}}/data --port={{PORT}} &"
stop_cmd: "{{BASE_DIR}}/current/bin/mysqladmin --defaults-file={{BASE_DIR}}/conf/my.cnf shutdown"
status_cmd: "lsof -i :{{PORT}} -t 2>/dev/null"

artifact_path: "external-package/mariadb.tar.gz"
package_includes:
  - bin/
  - lib/
  - share/
  - support-files/

health_check:
  type: tcp
  target: ":{{PORT}}"
  timeout: 60

provision:
  packages:
    - libaio1
    - libnuma1
  directories:
    - "{{BASE_DIR}}/data"
    - "{{BASE_DIR}}/tmp"
  commands:
    - "{{BASE_DIR}}/current/scripts/mariadb-install-db --datadir={{BASE_DIR}}/data --basedir={{BASE_DIR}}/current 2>/dev/null || true"

data_dirs:
  - data

log_file: "mariadb.log"

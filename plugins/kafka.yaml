# Apache Kafka module handler
# Created by comchangs — Supported by neurosam.AI
#
# Versions can override commands, provision, and health check.
# Unoverridden fields fall back to the plugin-level defaults.

name: kafka
description: Apache Kafka distributed event streaming platform
version: "1.0.0"
author: neurosam.AI

package:
  default_version: "3.7.0"
  url_template: "https://downloads.apache.org/kafka/{{VERSION}}/kafka_2.13-{{VERSION}}.tgz"
  versions:
    # Latest — full override example (Java 17, new path)
    "3.7.0":
      url: "https://downloads.apache.org/kafka/3.7.0/kafka_2.13-3.7.0.tgz"
      start_cmd: "{{BASE_DIR}}/current/kafka_2.13-3.7.0/bin/kafka-server-start.sh -daemon {{BASE_DIR}}/conf/server.properties"
      stop_cmd: "{{BASE_DIR}}/current/kafka_2.13-3.7.0/bin/kafka-server-stop.sh"
      provision:
        packages: [openjdk-17-jre-headless]
        directories: ["{{BASE_DIR}}/data/kafka-logs"]
        commands: ["ulimit -n 65536 2>/dev/null || true"]

    # Older versions — simple URL (uses plugin-level commands)
    "3.6.1": "https://downloads.apache.org/kafka/3.6.1/kafka_2.13-3.6.1.tgz"
    "3.5.2": "https://downloads.apache.org/kafka/3.5.2/kafka_2.13-3.5.2.tgz"

    # Legacy version with different Java requirement
    "3.4.0":
      url: "https://downloads.apache.org/kafka/3.4.0/kafka_2.13-3.4.0.tgz"
      start_cmd: "{{BASE_DIR}}/current/kafka_2.13-3.4.0/bin/kafka-server-start.sh -daemon {{BASE_DIR}}/conf/server.properties"
      stop_cmd: "{{BASE_DIR}}/current/kafka_2.13-3.4.0/bin/kafka-server-stop.sh"
      provision:
        packages: [java-11-amazon-corretto-headless]
        directories: ["{{BASE_DIR}}/data/kafka-logs"]

# Fallback commands (used when version has no override)
start_cmd: "{{BASE_DIR}}/current/bin/kafka-server-start.sh -daemon {{BASE_DIR}}/conf/server.properties"
stop_cmd: "{{BASE_DIR}}/current/bin/kafka-server-stop.sh"
status_cmd: "lsof -i :{{PORT}} -t 2>/dev/null"

artifact_path: "external-package/kafka.tar.gz"
package_includes:
  - bin/
  - libs/
  - config/

health_check:
  type: tcp
  target: ":{{PORT}}"
  timeout: 60

# Fallback provision (used when version has no override)
provision:
  packages:
    - openjdk-17-jre-headless
  directories:
    - "{{BASE_DIR}}/data/kafka-logs"
  commands:
    - "ulimit -n 65536 2>/dev/null || true"

data_dirs:
  - data/kafka-logs

log_file: "server.log"

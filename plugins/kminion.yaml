# KMinion module handler
# by neurosam.AI — https://neurosam.ai

name: kminion
description: KMinion - Prometheus exporter for Apache Kafka monitoring
version: "1.0.0"
author: neurosam.AI

package:
  default_version: "2.2.3"
  url_template: "https://github.com/cloudhut/kminion/releases/download/v{{VERSION}}/kminion_{{VERSION}}_linux_amd64.tar.gz"
  versions:
    "2.2.3": "https://github.com/cloudhut/kminion/releases/download/v2.2.3/kminion_2.2.3_linux_amd64.tar.gz"
    "2.2.1": "https://github.com/cloudhut/kminion/releases/download/v2.2.1/kminion_2.2.1_linux_amd64.tar.gz"

build_cmd: ""
start_cmd: "CONFIG_FILEPATH={{BASE_DIR}}/conf/config.yaml nohup {{BASE_DIR}}/current/kminion > {{BASE_DIR}}/logs/kminion.log 2>&1 &"
stop_cmd: "kill $(pgrep -f 'kminion.*{{BASE_DIR}}') 2>/dev/null || true"
status_cmd: "curl -sf http://localhost:{{PORT}}/metrics | head -1"

artifact_path: "external-package/kminion.tar.gz"
package_includes:
  - kminion

health_check:
  type: tcp
  target: ":{{PORT}}"
  timeout: 30

data_dirs: []

log_file: "kminion.log"

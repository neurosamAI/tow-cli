# Tow Release — by neurosam.AI
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_darwin_arm64: ${{ steps.checksums.outputs.sha_darwin_arm64 }}
      sha_darwin_amd64: ${{ steps.checksums.outputs.sha_darwin_amd64 }}
      sha_linux_arm64: ${{ steps.checksums.outputs.sha_linux_arm64 }}
      sha_linux_amd64: ${{ steps.checksums.outputs.sha_linux_amd64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE}"

          mkdir -p dist

          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              output="dist/tow-${GOOS}-${GOARCH}"
              echo "Building ${output}..."
              GOOS=${GOOS} GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o ${output} ./cmd/tow
            done
          done

          cd dist && sha256sum tow-* > checksums.txt

      - name: Extract checksums
        id: checksums
        run: |
          cd dist
          echo "sha_darwin_arm64=$(grep darwin-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_darwin_amd64=$(grep darwin-amd64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_linux_arm64=$(grep linux-arm64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_linux_amd64=$(grep linux-amd64 checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tow-*
            dist/checksums.txt
          body: |
            ## Tow ${{ github.ref_name }}

            **by [neurosam.AI](https://neurosam.ai)**

            See [CHANGELOG](https://github.com/neurosamAI/tow-cli/blob/main/CHANGELOG.md) for details.

            ### Installation

            ```bash
            # Homebrew
            brew install neurosamAI/tap/tow

            # npm
            npm install -g @neurosamai/tow

            # Go
            go install github.com/neurosamAI/tow-cli/cmd/tow@${{ github.ref_name }}

            # Binary (Linux amd64)
            curl -L https://github.com/neurosamAI/tow-cli/releases/download/${{ github.ref_name }}/tow-linux-amd64 -o tow
            chmod +x tow && sudo mv tow /usr/local/bin/

            # Binary (macOS Apple Silicon)
            curl -L https://github.com/neurosamAI/tow-cli/releases/download/${{ github.ref_name }}/tow-darwin-arm64 -o tow
            chmod +x tow && sudo mv tow /usr/local/bin/
            ```

            ### Checksums
            See `checksums.txt` for SHA-256 verification.

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update neurosamAI/homebrew-tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: neurosamAI/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ needs.release.outputs.version }}",
              "sha_darwin_arm64": "${{ needs.release.outputs.sha_darwin_arm64 }}",
              "sha_darwin_amd64": "${{ needs.release.outputs.sha_darwin_amd64 }}",
              "sha_linux_arm64": "${{ needs.release.outputs.sha_linux_arm64 }}",
              "sha_linux_amd64": "${{ needs.release.outputs.sha_linux_amd64 }}"
            }

  npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update version and publish
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          # Update version in package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json

          # Copy root files
          cp ../../LICENSE .
          cp ../../README.md .

          npm publish --access public

  vscode:
    name: Publish VS Code Extension
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and publish
        working-directory: integrations/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm install
          npx @vscode/vsce publish -p $VSCE_PAT
